<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Record Payment - Workforce Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><a href="/">Workforce &amp; Talent Operations Hub</a></div>
        <div class="navbar-menu">
            <span class="navbar-user">Logged in as: <strong sec:authentication="name">User</strong></span>
            <div class="navbar-links"><a th:href="@{/finance/payments}" class="active">Payments</a></div>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-logout">Logout</button>
            </form>
        </div>
    </nav>

    <main class="container">
        <h2>Record Payment</h2>
        <form th:action="@{/finance/payments/new}" method="post" class="form" style="max-width:700px">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-row">
                <div class="form-group">
                    <label for="referenceNumber">Reference Number *</label>
                    <input type="text" id="referenceNumber" name="referenceNumber" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label for="amount">Amount *</label>
                    <input type="number" id="amount" name="amount" class="form-control" required step="0.01" min="0.01"/>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="channel">Payment Channel *</label>
                    <select id="channel" name="channel" class="form-control" required onchange="toggleChannelFields()">
                        <option th:each="ch : ${channels}" th:value="${ch}" th:text="${ch.displayName}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" name="location" class="form-control"/>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="payerName">Payer Name</label>
                    <input type="text" id="payerName" name="payerName" class="form-control"/>
                </div>
                <div class="form-group" id="checkField">
                    <label for="checkNumber">Check Number</label>
                    <input type="text" id="checkNumber" name="checkNumber" class="form-control"/>
                </div>
                <div class="form-group" id="cardField" style="display:none">
                    <label for="cardLastFour">Card Last 4 Digits</label>
                    <input type="text" id="cardLastFour" name="cardLastFour" class="form-control" maxlength="4" pattern="[0-9]{4}"/>
                </div>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" class="form-control" rows="2"></textarea>
            </div>

            <div class="panel" style="margin-top:1rem;background:#f9f9f9">
                <p><strong>Note:</strong> All payments are recorded offline. No network processing occurs. An idempotency key is automatically generated to prevent double-posting.</p>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Record Payment</button>
                <a th:href="@{/finance/payments}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </main>
    <footer class="footer"><p>Workforce &amp; Talent Operations Hub &copy; 2026</p></footer>
    <script>
        function toggleChannelFields() {
            var ch = document.getElementById('channel').value;
            document.getElementById('checkField').style.display = ch === 'CHECK' ? '' : 'none';
            document.getElementById('cardField').style.display = ch === 'MANUAL_CARD' ? '' : 'none';
        }
        toggleChannelFields();
    </script>
</body>
</html>
