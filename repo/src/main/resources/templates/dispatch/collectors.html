<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Collectors - Workforce Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><a href="/">Workforce &amp; Talent Operations Hub</a></div>
        <div class="navbar-menu">
            <span class="navbar-user">Logged in as: <strong sec:authentication="name">User</strong></span>
            <div class="navbar-links">
                <a th:href="@{/dispatch/dashboard}">Dashboard</a>
                <a th:href="@{/dispatch/collectors}" class="active">Collectors</a>
                <a th:href="@{/dispatch/sites}">Sites</a>
                <a th:href="@{/dispatch/assignments}">Dispatch</a>
            </div>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-logout">Logout</button>
            </form>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h2>Collector Profiles</h2>
            <a th:href="@{/dispatch/collectors/new}" class="btn btn-primary">Add Collector</a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div class="filter-form">
            <div class="stage-pills">
                <a th:href="@{/dispatch/collectors}" class="pill"
                   th:classappend="${selectedStatus == null} ? 'pill-active' : ''">All</a>
                <a th:each="s : ${statuses}"
                   th:href="@{/dispatch/collectors(status=${s})}"
                   th:text="${s.displayName}" class="pill"
                   th:classappend="${selectedStatus == s} ? 'pill-active' : ''"></a>
            </div>
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>Employee ID</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Zone</th>
                    <th>Status</th>
                    <th>Max Jobs</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${collectors}">
                    <td th:text="${c.employeeId ?: '-'}"></td>
                    <td><a th:href="@{/dispatch/collectors/{id}(id=${c.id})}" th:text="${c.fullName}"></a></td>
                    <td th:text="${c.phone ?: '-'}"></td>
                    <td th:text="${c.zone ?: '-'}"></td>
                    <td><span class="badge" th:text="${c.status.displayName}"
                              th:classappend="${c.status.name() == 'AVAILABLE'} ? 'badge-open' : (${c.status.name() == 'INACTIVE'} ? 'badge-inactive' : 'badge-info')"></span></td>
                    <td th:text="${c.maxConcurrentJobs}"></td>
                    <td><a th:href="@{/dispatch/collectors/{id}/edit(id=${c.id})}" class="btn btn-sm">Edit</a></td>
                </tr>
                <tr th:if="${#lists.isEmpty(collectors)}">
                    <td colspan="7" class="empty-row">No collectors found</td>
                </tr>
            </tbody>
        </table>
    </main>

    <footer class="footer"><p>Workforce &amp; Talent Operations Hub &copy; 2026</p></footer>
</body>
</html>
