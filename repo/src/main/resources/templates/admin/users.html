<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>User Management - Workforce Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><a href="/">Workforce &amp; Talent Operations Hub</a></div>
        <div class="navbar-menu">
            <span class="navbar-user">Logged in as: <strong sec:authentication="name">User</strong></span>
            <div class="navbar-links">
                <a th:href="@{/admin/dashboard}">Dashboard</a>
                <a th:href="@{/admin/users}" class="active">Manage Users</a>
                <a th:href="@{/admin/audit}">Audit Log</a>
            </div>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-logout">Logout</button>
            </form>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h2>User Management</h2>
            <a th:href="@{/admin/users/new}" class="btn btn-primary">Create New User</a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Display Name</th>
                    <th>Email</th>
                    <th>Roles</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.username}"></td>
                    <td th:text="${user.displayName}"></td>
                    <td th:text="${user.email}"></td>
                    <td>
                        <span th:each="role : ${user.roles}" class="badge"
                              th:text="${role.name}" th:classappend="'badge-' + ${role.name.name().toLowerCase()}">
                        </span>
                    </td>
                    <td>
                        <span th:if="${user.enabled}" class="badge badge-active">Active</span>
                        <span th:unless="${user.enabled}" class="badge badge-inactive">Disabled</span>
                    </td>
                    <td>
                        <a th:href="@{/admin/users/{id}/edit(id=${user.id})}" class="btn btn-sm">Edit</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>

    <footer class="footer"><p>Workforce &amp; Talent Operations Hub &copy; 2026</p></footer>
</body>
</html>
