<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Audit Log - Workforce Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><a href="/">Workforce &amp; Talent Operations Hub</a></div>
        <div class="navbar-menu">
            <span class="navbar-user">Logged in as: <strong sec:authentication="name">User</strong></span>
            <div class="navbar-links">
                <a th:href="@{/admin/dashboard}">Dashboard</a>
                <a th:href="@{/admin/users}">Manage Users</a>
                <a th:href="@{/admin/audit}" class="active">Audit Log</a>
            </div>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-logout">Logout</button>
            </form>
        </div>
    </nav>

    <main class="container">
        <h2>Audit Log</h2>
        <p class="muted">Administrator audit trail</p>

        <form th:action="@{/admin/audit}" method="get" class="filter-form">
            <div class="filter-row">
                <div class="form-group">
                    <label for="userId">User ID</label>
                    <input type="number" id="userId" name="userId" th:value="${filter.userId}" class="form-control"/>
                </div>
                <div class="form-group">
                    <label for="action">Action</label>
                    <select id="action" name="action" class="form-control">
                        <option value="">All Actions</option>
                        <option th:each="act : ${actions}" th:value="${act}" th:text="${act}"
                                th:selected="${filter.action == act}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="dateFrom">From</label>
                    <input type="datetime-local" id="dateFrom" name="dateFrom"
                           th:value="${filter.dateFrom}" class="form-control"/>
                </div>
                <div class="form-group">
                    <label for="dateTo">To</label>
                    <input type="datetime-local" id="dateTo" name="dateTo"
                           th:value="${filter.dateTo}" class="form-control"/>
                </div>
                <div class="form-group">
                    <label for="workstationId">Workstation ID</label>
                    <input type="text" id="workstationId" name="workstationId"
                           th:value="${filter.workstationId}" class="form-control"/>
                </div>
                <div class="form-group form-group-btn">
                    <button type="submit" class="btn btn-primary">Search</button>
                    <a th:href="@{/admin/audit}" class="btn btn-secondary">Clear</a>
                </div>
            </div>
        </form>

        <table class="data-table">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>User</th>
                    <th>Action</th>
                    <th>Resource</th>
                    <th>Detail</th>
                    <th>Workstation</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="log : ${logs.content}">
                    <td th:text="${#temporals.format(log.timestamp, 'yyyy-MM-dd HH:mm:ss')}"></td>
                    <td th:text="${log.username}"></td>
                    <td><span class="badge" th:text="${log.action}"
                              th:classappend="'badge-' + ${log.action.name().toLowerCase()}"></span></td>
                    <td th:text="${log.resource}"></td>
                    <td th:text="${log.detail}"></td>
                    <td th:text="${log.workstationId}"></td>
                </tr>
                <tr th:if="${logs.totalElements == 0}">
                    <td colspan="6" class="empty-row">No audit log entries found</td>
                </tr>
            </tbody>
        </table>

        <!-- Pagination -->
        <div class="pagination" th:if="${logs.totalPages > 1}">
            <a th:if="${logs.number > 0}"
               th:href="@{/admin/audit(page=${logs.number - 1}, size=${logs.size})}"
               class="btn btn-sm">Previous</a>
            <span class="page-info"
                  th:text="'Page ' + ${logs.number + 1} + ' of ' + ${logs.totalPages}"></span>
            <a th:if="${logs.number < logs.totalPages - 1}"
               th:href="@{/admin/audit(page=${logs.number + 1}, size=${logs.size})}"
               class="btn btn-sm">Next</a>
        </div>
    </main>

    <footer class="footer"><p>Workforce &amp; Talent Operations Hub &copy; 2026</p></footer>
</body>
</html>
