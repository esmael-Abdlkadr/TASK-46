<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>User Form - Workforce Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><a href="/">Workforce &amp; Talent Operations Hub</a></div>
        <div class="navbar-menu">
            <span class="navbar-user">Logged in as: <strong sec:authentication="name">User</strong></span>
            <div class="navbar-links">
                <a th:href="@{/admin/dashboard}">Dashboard</a>
                <a th:href="@{/admin/users}" class="active">Manage Users</a>
                <a th:href="@{/admin/audit}">Audit Log</a>
            </div>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-logout">Logout</button>
            </form>
        </div>
    </nav>

    <main class="container">
        <!-- Create New User Form -->
        <div th:if="${userForm != null}">
            <h2>Create New User</h2>
            <form th:action="@{/admin/users/new}" th:object="${userForm}" method="post" class="form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" required/>
                    <span th:if="${#fields.hasErrors('username')}" class="field-error" th:errors="*{username}"></span>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control" required/>
                    <span th:if="${#fields.hasErrors('password')}" class="field-error" th:errors="*{password}"></span>
                </div>
                <div class="form-group">
                    <label for="displayName">Display Name</label>
                    <input type="text" id="displayName" th:field="*{displayName}" class="form-control"/>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control"/>
                </div>
                <div class="form-group">
                    <label>Roles</label>
                    <div class="checkbox-group">
                        <label th:each="role : ${allRoles}">
                            <input type="checkbox" th:field="*{roles}" th:value="${role}"/>
                            <span th:text="${role}"></span>
                        </label>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Create User</button>
                    <a th:href="@{/admin/users}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>

        <!-- Edit Existing User Form -->
        <div th:if="${user != null}">
            <h2>Edit User</h2>
            <form th:action="@{/admin/users/{id}/edit(id=${user.id})}" method="post" class="form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" th:value="${user.username}" class="form-control" disabled/>
                </div>
                <div class="form-group">
                    <label for="displayName">Display Name</label>
                    <input type="text" id="displayName" name="displayName" th:value="${user.displayName}" class="form-control"/>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" th:value="${user.email}" class="form-control"/>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" name="enabled" th:checked="${user.enabled}"/>
                        Account Enabled
                    </label>
                </div>
                <div class="form-group">
                    <label>Roles</label>
                    <div class="checkbox-group">
                        <label th:each="role : ${allRoles}">
                            <input type="checkbox" name="roles" th:value="${role}"
                                   th:checked="${user.roles.![name.name()].contains(role.name())}"/>
                            <span th:text="${role}"></span>
                        </label>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Update User</button>
                    <a th:href="@{/admin/users}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer"><p>Workforce &amp; Talent Operations Hub &copy; 2026</p></footer>
</body>
</html>
