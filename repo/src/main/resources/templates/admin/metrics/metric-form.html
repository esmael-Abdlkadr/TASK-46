<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Metric Form - Workforce Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><a href="/">Workforce &amp; Talent Operations Hub</a></div>
        <div class="navbar-menu">
            <span class="navbar-user">Logged in as: <strong sec:authentication="name">User</strong></span>
            <div class="navbar-links"><a th:href="@{/admin/metrics}" class="active">Metrics</a></div>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-logout">Logout</button>
            </form>
        </div>
    </nav>

    <main class="container">
        <h2 th:text="${metric != null and metric.id != null} ? 'Edit Metric' : 'Define New Metric'">Metric Form</h2>

        <form th:action="${metric != null and metric.id != null} ? @{/admin/metrics/{id}/edit(id=${metric.id})} : @{/admin/metrics/new}"
              method="post" class="form" style="max-width:800px">

            <div class="form-row">
                <div class="form-group">
                    <label for="slug">Slug * (unique identifier)</label>
                    <input type="text" id="slug" name="slug" th:value="${metric?.slug}" class="form-control" required
                           pattern="[a-z0-9_-]+" title="lowercase, numbers, hyphens, underscores"
                           th:readonly="${metric != null and metric.id != null}"/>
                </div>
                <div class="form-group">
                    <label for="name">Display Name *</label>
                    <input type="text" id="name" name="name" th:value="${metric?.name}" class="form-control" required/>
                </div>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" class="form-control" rows="2" th:text="${metric?.description}"></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="dataType">Data Type *</label>
                    <select id="dataType" name="dataType" class="form-control" required>
                        <option th:each="dt : ${dataTypes}" th:value="${dt}" th:text="${dt}"
                                th:selected="${metric != null and metric.dataType == dt}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="aggregationType">Aggregation *</label>
                    <select id="aggregationType" name="aggregationType" class="form-control" required>
                        <option th:each="at : ${aggregationTypes}" th:value="${at}" th:text="${at}"
                                th:selected="${metric != null and metric.aggregationType == at}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="unit">Unit</label>
                    <input type="text" id="unit" name="unit" th:value="${metric?.unit}" class="form-control" placeholder="e.g. USD, %, days"/>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="sourceTable">Source Table</label>
                    <input type="text" id="sourceTable" name="sourceTable" th:value="${metric?.sourceTable}" class="form-control"/>
                </div>
                <div class="form-group">
                    <label for="sourceColumn">Source Column</label>
                    <input type="text" id="sourceColumn" name="sourceColumn" th:value="${metric?.sourceColumn}" class="form-control"/>
                </div>
            </div>

            <div class="form-group">
                <label for="filterExpression">Filter Expression (WHERE clause)</label>
                <input type="text" id="filterExpression" name="filterExpression" th:value="${metric?.filterExpression}" class="form-control"
                       placeholder="e.g. status = 'ACTIVE'"/>
            </div>

            <div class="panel" style="margin-top:1rem; background:#f9f9f9;">
                <label class="inline-label">
                    <input type="checkbox" name="derived" id="derived" th:checked="${metric != null and metric.derived}" onchange="toggleFormula()"/>
                    <strong>Derived Metric</strong> (computed from other metrics)
                </label>
                <div id="formula-section" style="margin-top:0.5rem;" th:style="${metric == null or !metric.derived} ? 'display:none' : ''">
                    <label for="formula">Formula</label>
                    <input type="text" id="formula" name="formula" th:value="${metric?.formula}" class="form-control"
                           placeholder="e.g. hire_rate / total_applications * 100"/>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" th:text="${metric != null and metric.id != null} ? 'Update' : 'Create'">Save</button>
                <a th:href="@{/admin/metrics}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </main>

    <footer class="footer"><p>Workforce &amp; Talent Operations Hub &copy; 2026</p></footer>
    <script>
        function toggleFormula() {
            document.getElementById('formula-section').style.display =
                document.getElementById('derived').checked ? '' : 'none';
        }
    </script>
</body>
</html>
