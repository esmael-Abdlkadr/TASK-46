<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Departments - Workforce Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><a href="/">Workforce &amp; Talent Operations Hub</a></div>
        <div class="navbar-menu">
            <span class="navbar-user">Logged in as: <strong sec:authentication="name">User</strong></span>
            <div class="navbar-links">
                <a th:href="@{/search}">Search</a>
                <a th:href="@{/exports}">Exports</a>
                <a th:href="@{/imports}">Imports</a>
                <a th:href="@{/masterdata/departments}" class="active">Departments</a>
                <a th:href="@{/masterdata/classes}">Classes</a>
                <a th:href="@{/masterdata/courses}">Courses</a>
                <a th:href="@{/masterdata/semesters}">Semesters</a>
            </div>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-logout">Logout</button>
            </form>
        </div>
    </nav>

    <main class="container">
        <h2>Departments</h2>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div class="panel" style="margin-bottom:1.5rem">
            <h3>Add / Edit Department</h3>
            <form th:action="@{/masterdata/departments/save}" method="post" class="form-row">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="id" value=""/>
                <div class="form-group">
                    <input type="text" name="code" class="form-control" placeholder="Code *" required/>
                </div>
                <div class="form-group">
                    <input type="text" name="name" class="form-control" placeholder="Name *" required/>
                </div>
                <div class="form-group">
                    <input type="text" name="headName" class="form-control" placeholder="Head Name"/>
                </div>
                <button type="submit" class="btn btn-primary btn-sm">Save</button>
            </form>
        </div>

        <table class="data-table">
            <thead><tr><th>Code</th><th>Name</th><th>Head</th><th>Active</th></tr></thead>
            <tbody>
                <tr th:each="d : ${departments}">
                    <td th:text="${d.code}"></td>
                    <td th:text="${d.name}"></td>
                    <td th:text="${d.headName ?: '-'}"></td>
                    <td><span th:if="${d.active}" class="badge badge-open">Yes</span>
                        <span th:unless="${d.active}" class="badge badge-inactive">No</span></td>
                </tr>
                <tr th:if="${#lists.isEmpty(departments)}"><td colspan="4" class="empty-row">No departments</td></tr>
            </tbody>
        </table>
    </main>
    <footer class="footer"><p>Workforce &amp; Talent Operations Hub &copy; 2026</p></footer>
</body>
</html>
