<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Staffing Classes - Workforce Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><a href="/">Workforce &amp; Talent Operations Hub</a></div>
        <div class="navbar-menu">
            <span class="navbar-user">Logged in as: <strong sec:authentication="name">User</strong></span>
            <div class="navbar-links">
                <a th:href="@{/masterdata/departments}">Departments</a>
                <a th:href="@{/masterdata/classes}" class="active">Classes</a>
                <a th:href="@{/masterdata/courses}">Courses</a>
                <a th:href="@{/masterdata/semesters}">Semesters</a>
            </div>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-logout">Logout</button>
            </form>
        </div>
    </nav>

    <main class="container">
        <h2>Staffing Classes</h2>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div class="panel" style="margin-bottom:1.5rem">
            <h3>Add Class</h3>
            <form th:action="@{/masterdata/classes/save}" method="post" class="form-row">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group"><input type="text" name="code" class="form-control" placeholder="Code *" required/></div>
                <div class="form-group"><input type="text" name="name" class="form-control" placeholder="Name *" required/></div>
                <div class="form-group">
                    <select name="departmentId" class="form-control">
                        <option value="">Department</option>
                        <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.name}"></option>
                    </select>
                </div>
                <div class="form-group"><input type="number" name="maxHeadcount" class="form-control" placeholder="Max Headcount" min="1"/></div>
                <button type="submit" class="btn btn-primary btn-sm">Save</button>
            </form>
        </div>

        <table class="data-table">
            <thead><tr><th>Code</th><th>Name</th><th>Department</th><th>Max HC</th><th>Active</th></tr></thead>
            <tbody>
                <tr th:each="c : ${classes}">
                    <td th:text="${c.code}"></td>
                    <td th:text="${c.name}"></td>
                    <td th:text="${c.department != null} ? ${c.department.name} : '-'"></td>
                    <td th:text="${c.maxHeadcount ?: '-'}"></td>
                    <td><span th:if="${c.active}" class="badge badge-open">Yes</span></td>
                </tr>
                <tr th:if="${#lists.isEmpty(classes)}"><td colspan="5" class="empty-row">No classes</td></tr>
            </tbody>
        </table>
    </main>
    <footer class="footer"><p>Workforce &amp; Talent Operations Hub &copy; 2026</p></footer>
</body>
</html>
