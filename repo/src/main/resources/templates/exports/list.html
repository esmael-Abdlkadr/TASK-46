<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Exports - Workforce Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><a href="/">Workforce &amp; Talent Operations Hub</a></div>
        <div class="navbar-menu">
            <span class="navbar-user">Logged in as: <strong sec:authentication="name">User</strong></span>
            <div class="navbar-links">
                <a th:href="@{/search}">Search</a>
                <a th:href="@{/exports}" class="active">Exports</a>
                <a th:href="@{/imports}">Imports</a>
                <a th:href="@{/masterdata/departments}" sec:authorize="hasRole('ADMINISTRATOR')">Master Data</a>
            </div>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-logout">Logout</button>
            </form>
        </div>
    </nav>

    <main class="container">
        <h2>Exports</h2>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <!-- New export form -->
        <div class="panel" style="margin-bottom:1.5rem">
            <h3>Create Export</h3>
            <form th:action="@{/exports/create}" method="post" class="form-row">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" class="form-control" required placeholder="Export name"/>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select name="exportType" class="form-control" required>
                        <option value="candidates">Candidates</option>
                        <option value="collectors">Collectors</option>
                        <option value="departments">Departments</option>
                        <option value="courses">Training Courses</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Format</label>
                    <select name="fileFormat" class="form-control" required>
                        <option value="xlsx">Excel (.xlsx)</option>
                        <option value="csv">CSV (.csv)</option>
                    </select>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Queue Export</button>
                </div>
            </form>
        </div>

        <!-- Export jobs list -->
        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th><th>Name</th><th>Type</th><th>Format</th>
                    <th>Status</th><th>Records</th><th>Created</th><th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="e : ${exports}">
                    <td th:text="${e.id}"></td>
                    <td th:text="${e.name}"></td>
                    <td th:text="${e.exportType}"></td>
                    <td th:text="${e.fileFormat}"></td>
                    <td><span class="badge" th:text="${e.status.displayName}"
                              th:classappend="${e.status.name() == 'COMPLETED'} ? 'badge-open' : (${e.status.name() == 'FAILED'} ? 'badge-high' : (${e.status.name() == 'RUNNING'} ? 'badge-info' : 'badge-warning'))"></span></td>
                    <td th:text="${e.recordCount ?: '-'}"></td>
                    <td th:text="${#temporals.format(e.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                    <td>
                        <a th:if="${e.status.name() == 'COMPLETED'}"
                           th:href="@{/exports/{id}/download(id=${e.id})}" class="btn btn-sm btn-primary">Download</a>
                        <span th:if="${e.status.name() == 'FAILED'}" class="field-error" th:title="${e.errorMessage}">Error</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(exports)}">
                    <td colspan="8" class="empty-row">No export jobs</td>
                </tr>
            </tbody>
        </table>
    </main>

    <footer class="footer"><p>Workforce &amp; Talent Operations Hub &copy; 2026</p></footer>
</body>
</html>
