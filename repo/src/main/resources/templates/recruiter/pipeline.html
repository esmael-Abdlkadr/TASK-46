<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Pipeline - Workforce Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><a href="/">Workforce &amp; Talent Operations Hub</a></div>
        <div class="navbar-menu">
            <span class="navbar-user">Logged in as: <strong sec:authentication="name">User</strong></span>
            <div class="navbar-links">
                <a th:href="@{/recruiter/dashboard}">Dashboard</a>
                <a th:href="@{/recruiter/candidates}">Candidates</a>
                <a th:href="@{/recruiter/job-profiles}">Job Profiles</a>
                <a th:href="@{/recruiter/search}">Intelligent Search</a>
                <a th:href="@{/recruiter/pipeline}" class="active">Pipeline</a>
                <a th:href="@{/recruiter/talent-pools}">Talent Pools</a>
            </div>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-logout">Logout</button>
            </form>
        </div>
    </nav>

    <main class="container">
        <h2>Recruiting Pipeline Overview</h2>

        <div class="pipeline-board">
            <div th:each="entry : ${stageCounts}" class="pipeline-column">
                <div class="pipeline-header">
                    <span class="pipeline-stage-name" th:text="${entry.key.displayName}"></span>
                    <span class="pipeline-count" th:text="${entry.value}"></span>
                </div>
                <a th:href="@{/recruiter/candidates(stage=${entry.key})}" class="btn btn-sm">View</a>
            </div>
        </div>
    </main>

    <footer class="footer"><p>Workforce &amp; Talent Operations Hub &copy; 2026</p></footer>
</body>
</html>
