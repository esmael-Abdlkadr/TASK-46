<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Candidates - Workforce Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><a href="/">Workforce &amp; Talent Operations Hub</a></div>
        <div class="navbar-menu">
            <span class="navbar-user">Logged in as: <strong sec:authentication="name">User</strong></span>
            <div class="navbar-links">
                <a th:href="@{/recruiter/dashboard}">Dashboard</a>
                <a th:href="@{/recruiter/candidates}" class="active">Candidates</a>
                <a th:href="@{/recruiter/job-profiles}">Job Profiles</a>
                <a th:href="@{/recruiter/search}">Intelligent Search</a>
                <a th:href="@{/recruiter/pipeline}">Pipeline</a>
                <a th:href="@{/recruiter/talent-pools}">Talent Pools</a>
            </div>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-logout">Logout</button>
            </form>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h2>Candidate Profiles</h2>
            <a th:href="@{/recruiter/candidates/new}" class="btn btn-primary">Add Candidate</a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <!-- Undo banner -->
        <div th:if="${batchId}" class="alert alert-success undo-banner" th:id="'undo-' + ${batchId}">
            <span th:text="${success}"></span>
            <form th:action="@{/recruiter/pipeline/undo/{id}(id=${batchId})}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-sm btn-secondary" id="undo-btn">Undo</button>
                <span id="undo-timer" class="undo-timer" th:data-deadline="${undoDeadline}"></span>
            </form>
        </div>

        <!-- Stage filter -->
        <div class="filter-form">
            <div class="filter-row">
                <div class="form-group">
                    <label>Filter by Stage</label>
                    <div class="stage-pills">
                        <a th:href="@{/recruiter/candidates}" class="pill"
                           th:classappend="${selectedStage == null} ? 'pill-active' : ''">All</a>
                        <a th:each="stage : ${stages}"
                           th:href="@{/recruiter/candidates(stage=${stage})}"
                           th:text="${stage.displayName} + ' (' + ${stageCounts[stage]} + ')'"
                           class="pill"
                           th:classappend="${selectedStage == stage} ? 'pill-active' : ''"></a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bulk actions form -->
        <form id="bulk-form" method="post" class="bulk-actions-bar" style="display:none">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <span id="selected-count">0 selected</span>

            <div class="bulk-action-group">
                <select id="bulk-stage" name="targetStage" class="form-control" style="width:auto">
                    <option value="">Move to stage...</option>
                    <option th:each="stage : ${stages}" th:value="${stage}" th:text="${stage.displayName}"></option>
                </select>
                <button type="button" onclick="submitBatchMove()" class="btn btn-primary btn-sm">Move</button>
            </div>

            <div class="bulk-action-group">
                <input type="text" id="bulk-tag" name="tag" placeholder="Tag name" class="form-control" style="width:150px"/>
                <button type="button" onclick="submitBulkTag()" class="btn btn-primary btn-sm">Tag</button>
            </div>
        </form>

        <table class="data-table">
            <thead>
                <tr>
                    <th><input type="checkbox" id="select-all"/></th>
                    <th>Name</th>
                    <th>Title</th>
                    <th>Location</th>
                    <th>Experience</th>
                    <th>Stage</th>
                    <th>Tags</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${candidates}">
                    <td><input type="checkbox" class="candidate-cb" th:value="${c.id}"/></td>
                    <td><a th:href="@{/recruiter/candidates/{id}(id=${c.id})}" th:text="${c.fullName}"></a></td>
                    <td th:text="${c.currentTitle}"></td>
                    <td th:text="${c.location}"></td>
                    <td th:text="${c.yearsOfExperience != null} ? ${c.yearsOfExperience} + ' yrs' : '-'"></td>
                    <td><span class="badge" th:text="${c.pipelineStage.displayName}"
                              th:classappend="'badge-stage-' + ${c.pipelineStage.name().toLowerCase()}"></span></td>
                    <td th:text="${c.tags}"></td>
                    <td>
                        <a th:href="@{/recruiter/candidates/{id}/edit(id=${c.id})}" class="btn btn-sm">Edit</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(candidates)}">
                    <td colspan="8" class="empty-row">No candidates found</td>
                </tr>
            </tbody>
        </table>
    </main>

    <footer class="footer"><p>Workforce &amp; Talent Operations Hub &copy; 2026</p></footer>

    <script th:src="@{/js/app.js}"></script>
    <script>
        document.getElementById('select-all')?.addEventListener('change', function() {
            document.querySelectorAll('.candidate-cb').forEach(cb => cb.checked = this.checked);
            updateBulkBar();
        });
        document.querySelectorAll('.candidate-cb').forEach(cb =>
            cb.addEventListener('change', updateBulkBar));

        function updateBulkBar() {
            const checked = document.querySelectorAll('.candidate-cb:checked');
            const bar = document.getElementById('bulk-form');
            const count = document.getElementById('selected-count');
            if (checked.length > 0) {
                bar.style.display = 'flex';
                count.textContent = checked.length + ' selected';
            } else {
                bar.style.display = 'none';
            }
        }

        function getSelectedIds() {
            return Array.from(document.querySelectorAll('.candidate-cb:checked')).map(cb => cb.value);
        }

        function submitBatchMove() {
            const ids = getSelectedIds();
            const stage = document.getElementById('bulk-stage').value;
            if (!ids.length || !stage) { alert('Select candidates and a target stage'); return; }
            if (!confirm('Move ' + ids.length + ' candidates to ' + stage + '?')) return;
            const form = document.getElementById('bulk-form');
            form.action = '/recruiter/pipeline/batch-move';
            // add hidden inputs for candidateIds
            ids.forEach(id => {
                const input = document.createElement('input');
                input.type = 'hidden'; input.name = 'candidateIds'; input.value = id;
                form.appendChild(input);
            });
            form.submit();
        }

        function submitBulkTag() {
            const ids = getSelectedIds();
            const tag = document.getElementById('bulk-tag').value.trim();
            if (!ids.length || !tag) { alert('Select candidates and enter a tag'); return; }
            const form = document.getElementById('bulk-form');
            form.action = '/recruiter/candidates/bulk-tag';
            ids.forEach(id => {
                const input = document.createElement('input');
                input.type = 'hidden'; input.name = 'candidateIds'; input.value = id;
                form.appendChild(input);
            });
            form.submit();
        }

        // Undo countdown timer
        (function() {
            const timerEl = document.getElementById('undo-timer');
            const undoBtn = document.getElementById('undo-btn');
            if (!timerEl || !undoBtn) return;
            const deadline = new Date(timerEl.dataset.deadline).getTime();
            const interval = setInterval(function() {
                const remaining = Math.max(0, Math.floor((deadline - Date.now()) / 1000));
                timerEl.textContent = '(' + remaining + 's remaining)';
                if (remaining <= 0) {
                    clearInterval(interval);
                    undoBtn.disabled = true;
                    undoBtn.textContent = 'Expired';
                    timerEl.textContent = '';
                }
            }, 1000);
        })();
    </script>
</body>
</html>
