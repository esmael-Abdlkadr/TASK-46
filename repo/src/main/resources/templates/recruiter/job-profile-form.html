<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Job Profile Form - Workforce Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><a href="/">Workforce &amp; Talent Operations Hub</a></div>
        <div class="navbar-menu">
            <span class="navbar-user">Logged in as: <strong sec:authentication="name">User</strong></span>
            <div class="navbar-links">
                <a th:href="@{/recruiter/job-profiles}" class="active">Job Profiles</a>
            </div>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-logout">Logout</button>
            </form>
        </div>
    </nav>

    <main class="container">
        <h2 th:text="${jobProfile.id != null} ? 'Edit Job Profile' : 'New Job Profile'">Job Profile Form</h2>

        <form th:action="${jobProfile.id != null} ? @{/recruiter/job-profiles/{id}/edit(id=${jobProfile.id})} : @{/recruiter/job-profiles/new}"
              method="post" class="form" style="max-width:800px">

            <div class="form-row">
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" name="title" th:value="${jobProfile.title}" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label for="department">Department</label>
                    <input type="text" id="department" name="department" th:value="${jobProfile.department}" class="form-control"/>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" name="location" th:value="${jobProfile.location}" class="form-control"/>
                </div>
                <div class="form-group">
                    <label for="minYearsExperience">Min Years Experience</label>
                    <input type="number" id="minYearsExperience" name="minYearsExperience" th:value="${jobProfile.minYearsExperience}" class="form-control" min="0"/>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="educationRequirement">Education Requirement</label>
                    <input type="text" id="educationRequirement" name="educationRequirement" th:value="${jobProfile.educationRequirement}" class="form-control"/>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" name="active" th:checked="${jobProfile.active}"/> Active
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" class="form-control" rows="3" th:text="${jobProfile.description}"></textarea>
            </div>

            <!-- Criteria section with weights -->
            <div class="panel" style="margin-top:1.5rem">
                <h3>Skill Criteria (with weights for ranking)</h3>
                <div id="criteria-container">
                    <div th:each="criterion : ${jobProfile.criteria}" class="criteria-row form-row">
                        <div class="form-group"><input type="text" name="criteriaSkillNames" th:value="${criterion.skillName}" class="form-control" placeholder="Skill name"/></div>
                        <div class="form-group"><input type="number" name="criteriaMinYears" th:value="${criterion.minYears}" class="form-control" placeholder="Min years" min="0"/></div>
                        <div class="form-group">
                            <select name="criteriaTypes" class="form-control">
                                <option th:each="ct : ${criterionTypes}" th:value="${ct}" th:text="${ct}"
                                        th:selected="${criterion.criterionType == ct}"></option>
                            </select>
                        </div>
                        <div class="form-group"><input type="number" name="criteriaWeights" th:value="${criterion.weight}" class="form-control" placeholder="Weight" min="0.1" step="0.1"/></div>
                        <button type="button" class="btn btn-sm btn-secondary" onclick="this.closest('.criteria-row').remove()">X</button>
                    </div>
                </div>
                <button type="button" class="btn btn-sm btn-secondary" onclick="addCriterionRow()" style="margin-top:0.5rem">+ Add Criterion</button>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" th:text="${jobProfile.id != null} ? 'Update' : 'Create'">Save</button>
                <a th:href="@{/recruiter/job-profiles}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </main>

    <footer class="footer"><p>Workforce &amp; Talent Operations Hub &copy; 2026</p></footer>

    <script>
        function addCriterionRow() {
            const container = document.getElementById('criteria-container');
            const row = document.createElement('div');
            row.className = 'criteria-row form-row';
            row.innerHTML = `
                <div class="form-group"><input type="text" name="criteriaSkillNames" class="form-control" placeholder="Skill name"/></div>
                <div class="form-group"><input type="number" name="criteriaMinYears" class="form-control" placeholder="Min years" min="0"/></div>
                <div class="form-group">
                    <select name="criteriaTypes" class="form-control">
                        <option value="REQUIRED">REQUIRED</option>
                        <option value="PREFERRED">PREFERRED</option>
                    </select>
                </div>
                <div class="form-group"><input type="number" name="criteriaWeights" class="form-control" placeholder="Weight" min="0.1" step="0.1" value="1.0"/></div>
                <button type="button" class="btn btn-sm btn-secondary" onclick="this.closest('.criteria-row').remove()">X</button>
            `;
            container.appendChild(row);
        }
    </script>
</body>
</html>
