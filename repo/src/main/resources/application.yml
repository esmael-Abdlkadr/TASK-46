spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/workforce_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  thymeleaf:
    cache: true
    prefix: classpath:/templates/
    suffix: .html

app:
  encryption:
    key: ${APP_ENCRYPTION_KEY}
  rate-limit:
    requests-per-minute: 1000
  export:
    storage-path: ${APP_EXPORT_PATH:./exports}
  import:
    storage-path: ${APP_IMPORT_PATH:./imports}
  face-recognition:
    base-url: ${FACE_RECOGNITION_URL:http://localhost:5001}
    timeout-ms: 10000
  job-queue:
    max-queued: 100
    max-running: 4
    warn-threshold: 50
  file-storage:
    base-path: ${APP_FILE_STORAGE_PATH:./file-store}

spring.servlet.multipart:
  max-file-size: 50MB
  max-request-size: 50MB

server:
  error:
    whitelabel:
      enabled: false
