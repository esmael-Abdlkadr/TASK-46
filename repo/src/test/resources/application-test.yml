spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  encryption:
    key: dGhpcy1pcy1hLTMyLWJ5dGUta2V5ISEhMTIzNDU2Nzg=
  rate-limit:
    requests-per-minute: 100
  face-recognition:
    base-url: http://localhost:5001
    timeout-ms: 5000
  job-queue:
    max-queued: 100
    max-running: 4
    warn-threshold: 50
  file-storage:
    base-path: ./test-file-store
  export:
    storage-path: ./test-exports
  import:
    storage-path: ./test-imports
